<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Entregas — Tiempo Real</title>
<style>
  :root{
    --primary:#1f6f54;
    --bg:#f4f6f5;
    --card:#ffffff;
    --text:#1c2521;
    --muted:#6b7670;
    --border:#dfe4e1;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);
    color:var(--text);
    padding:24px;
  }
  header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
  h1{font-size:1.3rem;margin:0;}
  .live{display:flex;align-items:center;gap:6px;font-size:.82rem;color:var(--muted);}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--primary);animation:pulse 1.4s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

  table{width:100%;border-collapse:collapse;background:var(--card);border-radius:12px;overflow:hidden;border:1px solid var(--border);}
  th,td{padding:10px 12px;text-align:left;font-size:.85rem;border-bottom:1px solid var(--border);}
  th{background:#eef2f0;color:var(--muted);font-weight:600;text-transform:uppercase;font-size:.72rem;letter-spacing:.03em;}
  tr:last-child td{border-bottom:none;}
  tr:hover{background:#fafcfb;}

  .empty{text-align:center;color:var(--muted);padding:30px;}
  .config{background:#fff3cd;border:1px solid #ffe69c;color:#664d03;padding:10px 14px;border-radius:10px;font-size:.85rem;margin-bottom:14px;}
</style>
</head>
<body>
<header>
  <h1>Entregas registradas</h1>
  <div class="live"><span class="dot"></span> Actualización automática cada 5s</div>
</header>

<div class="config" id="configWarning" style="display:none;">
  Configura SCRIPT_URL en el código de esta página con la URL de tu Apps Script.
</div>

<table>
  <thead>
    <tr><th>Hora</th><th>Código</th><th>Nombre</th><th>Apellido</th><th>Teléfono</th><th>Documentos</th></tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>
<p class="empty" id="emptyMsg" style="display:none;">Aún no hay registros.</p>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyGUD7GzaFfr5igQXfx2CrRsmPdKkQCwdyWv219PAUP3mzPqmED_m8CukhCr3IEGYlOGQ/exec";

async function cargar() {
  if (SCRIPT_URL.includes("PEGA_AQUI")) {
    document.getElementById('configWarning').style.display = 'block';
    return;
  }
  try {
    const res = await fetch(SCRIPT_URL);
    const filas = await res.json();
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';
    document.getElementById('emptyMsg').style.display = filas.length ? 'none' : 'block';

    filas.forEach(f => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${f['Fecha y Hora'] || ''}</td>
        <td>${f['Código Escaneado'] || ''}</td>
        <td>${f['Nombre'] || ''}</td>
        <td>${f['Apellido'] || ''}</td>
        <td>${f['Teléfono'] || ''}</td>
        <td>${f['Documentos'] || ''}</td>
      `;
      tbody.appendChild(tr);
    });
  } catch (err) {
    console.error('Error al cargar datos:', err);
  }
}

cargar();
setInterval(cargar, 5000);
</script>
</body>
</html>
